name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    if: github.repository_owner == 'tanvirr007'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Write sign info
        if: github.repository == 'tanvirr007/study-releases'
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> keystore.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> keystore.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> keystore.properties
            echo storeFile='${{ github.workspace }}/key.jks' >> keystore.properties
            echo ${{ secrets.KEYSTORE }} | base64 --decode > ${{ github.workspace }}/key.jks
          fi

      - name: Get application version name
        run: echo "VERSION_NAME=$(${{ github.workspace }}/gradlew -q printVersionName)" >> $GITHUB_ENV

      - name: Set application version name
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{ github.run_number }}
          versionName: "${{ env.VERSION_NAME }}.${{ github.run_number }}"

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Prepare APK files for release
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}.apk
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CQ.apk

      - name: Get build metadata
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          APK_SHA=$(sha256sum app/build/outputs/apk/release/CQ.apk | awk '{print $1}')
          echo "COMMIT_HASH=$COMMIT_HASH" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          
          # Fetch previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Build changelog
          CHANGELOG=""
          if [ -z "$PREV_TAG" ]; then
            commits=$(git log --pretty=format:"%H %s")
          else
            commits=$(git log --pretty=format:"%H %s" $PREV_TAG..HEAD)
          fi
          
          if [ -z "$commits" ]; then
            CHANGELOG="* No changes."
          else
            while read -r hash title; do
              if [ ! -z "$hash" ]; then
                CHANGELOG="${CHANGELOG}* **$title** (${hash:0:7})"$'\n'
                # Get body of commit, filter out metadata
                body=$(git log -1 --pretty=format:"%b" "$hash" | grep -v -E "^Signed-off-by:|^Change-Id:|^Co-authored-by:" || true)
                if [ ! -z "$body" ]; then
                  while IFS= read -r line; do
                    if [ ! -z "$line" ]; then
                      CHANGELOG="${CHANGELOG}  $line"$'\n'
                    fi
                  done <<< "$body"
                fi
              fi
            done <<< "$commits"
          fi
          
          # Generate release_notes.md
          cat <<EOF | sed 's/^          //' > release_notes.md
          <img src="https://raw.githubusercontent.com/${{ github.repository }}/master/app-icon.png" width="48" height="48" style="border-radius: 10px;" /> **CQ Android WebView App**
          
          > [!NOTE]
          > This release tracks build \`v${{ env.VERSION_NAME }}.${{ github.run_number }}\`
          
          ### 📦 Build Information
          * **Version:** \`v${{ env.VERSION_NAME }}.${{ github.run_number }}\`
          * **Commit:** [\`$COMMIT_HASH\`](https://github.com/${{ github.repository }}/commit/$COMMIT_HASH)
          * **Build Time:** \`${BUILD_TIME}\`
          * **Android:** \`9.0+\`
          * 🔒 **SHA-256:** \`$APK_SHA\`
          
          ### 🔗 Direct Downloads
          * 📥 **Versioned APK:** [CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}.apk](https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION_NAME }}.${{ github.run_number }}/CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}.apk)
          * 🔄 **Latest APK (Permanent Link):** [CQ.apk](https://github.com/${{ github.repository }}/releases/latest/download/CQ.apk)
          
          ### 📝 Changelog
          ${CHANGELOG}
          EOF

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}"
          path: app/build/outputs/apk/release/CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the new release with the APKs for this specific build tag using the generated notes file
          gh release create "v${{ env.VERSION_NAME }}.${{ github.run_number }}" \
            --title "v${{ env.VERSION_NAME }}.${{ github.run_number }}" \
            -F release_notes.md \
            app/build/outputs/apk/release/CQ-v${{ env.VERSION_NAME }}.${{ github.run_number }}.apk \
            app/build/outputs/apk/release/CQ.apk